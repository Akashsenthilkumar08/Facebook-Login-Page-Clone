<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<style>
    .main{
        position: fixed;
        top: 475px;
        font-size: 30px;
        left: 50px;
        font-family:Arial, Helvetica, sans-serif;
        font-style: normal;

    }
    .blue{
        position: relative;
        top:60px;
        right: 190px;
        font-size: 55px ;
        font-family:Arial, Helvetica, sans-serif;
        font-style: normal;
        color: rgb(66, 66, 255);
    }
   .line{
    width: 2px;
    height: 90vh;      
    background-color: #d9d9d9;
    position: fixed;
    right: 650px;

   }
   .des{
    position: fixed;
    right: 382px;
    font-size: 22px;
    top:150px;
    font-family: Helvetica, Arial, sans-serif;
    font-weight: 50px;
   }
  .input-box {
    width: 500px;
    height: 52px;
    padding: 0 15px;          
    font-size: 16px;
    border: 1px solid #bbbaba;
    border-radius: 10px;
    outline: none;
    margin-left: 930px;
    margin-top: 220px;
    text-align: left;
    box-sizing: border-box;
}

.password {
    width: 500px;
    height: 52px;
    padding: 0 15px;          
    font-size: 16px;
    border: 1px solid #bbbaba;
    border-radius: 10px;
    outline: none;
    margin-left: 930px;
    margin-top: -3px;        
    text-align: left;
    box-sizing: border-box;
}
.log{
   
    width: 500px;
    height: 40px;
    margin-left: 930px;
    margin-top: 30px;
    background-color: #0560d7;
    color: white;
    font-size: 18px;
    font-family: Helvetica, Arial, sans-serif;
    font-weight: 700px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}
.log:hover{
    background-color: #2481fb;
}
.form{
    position: fixed;
}
.forgot{
    width: 500px;
    height: 40px;
    margin-left: 930px;
    margin-top: 20px;
    background-color: #ffffff;
    font-size: 16px;
    font-family: Helvetica, Arial, sans-serif;
    font-weight: 700px;
    border-radius: 20px;
    border: #ffffff;
    cursor: pointer;
}
.forgot:hover{
    background-color: #f0f2f5;
}
.account{
    width: 500px;
    height: 40px;
    margin-left: 930px;
    margin-top: 60px;
    background-color: #ffffff;
    font-size: 16px;
    font-family: Helvetica, Arial, sans-serif;
    font-weight: 700px;
    border-radius: 20px;
    border: 1px solid#3337fa;
    color: #0f75fb;
    cursor: pointer;
}
.account:hover{
    background-color: #f0f2f5;
}
.para{
    position: fixed;
    right: 312px;
    bottom: 236px;
}

.horizontal-line {
    width: 1510px;
    height: 1px;
    background-color: #dddfe2;
    position: fixed;
    bottom: 70px;
}
.footer-text {
    position: fixed;  
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    font-family: Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: #737373;
}
</style>
<body>

    <div class="main">
        <h1>Explore<br> the<br>things
    <span class="blue">you love.</span></h1>
    </div>
    <div class="logo">
        <img src="favicon.png"  width="65px" style="position: fixed;top:45px;left:50px">
    </div>
    <div class="line">
    </div>
    <div class="im">
        <img src="image.png" width="700px" style="position:fixed;top:90px; left:160px">
    </div>
    <div class="des">
        <h4>Log in to Facebook</h4>
    </div>
    <form style="position: fixed;">
        <input type="text" class="input-box" placeholder="Email address or phone number">
<br><br>
<input type="password" class="password" placeholder="Password">

    <button class="log">Log in</button>
    <button class="forgot">Forgotten password?</button>
    <button class="account">Create new account</button>
    <div class="para">
    <img src="meta.png" width="20px" style="position: fixed;bottom:250px;right:350px"><p>Meta</p></div>
    </form>
   
<div class="horizontal-line"></div>
<p class="footer-text">
    © 2026 Facebook Clone | Designed by Akash | For Educational Purposes
</p>
</body>
</html>
